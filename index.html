<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreCash Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <div id="dashboardPage" class="page active">
        <header style="margin-bottom: 20px;">
            <h1 style="font-size: 1.6rem; color: var(--primary);">StoreCash Pro</h1>
            <div style="display: flex; gap:10px; margin-top:15px;">
                <select id="storeSelect"></select>
                <input type="date" id="datePicker">
            </div>
        </header>

        <div class="stat-grid">
            <div class="stat-box" style="background:var(--primary)">
                <small>Today Net</small><h2 id="todayNet">₹0.00</h2>
            </div>
            <div class="stat-box" style="background:#1e293b">
                <small>Month Net</small><h2 id="monthNet">₹0.00</h2>
            </div>
        </div>

        <button class="btn" style="background: #25D366; width: 100%; margin-bottom: 15px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px;" onclick="shareDailyReport()">
            <i class="fas fa-share-nodes"></i> Share Today's Report
        </button>

        <div class="card">
            <input type="number" id="amount" placeholder="0.00" inputmode="decimal">
            <input type="text" id="description" placeholder="Note (e.g. Sales, Rent)">
            <div style="display:flex; gap:10px;">
                <button class="btn income-btn" onclick="addTransaction('income')">+ Income</button>
                <button class="btn expense-btn" onclick="addTransaction('expense')">- Expense</button>
            </div>
        </div>

        <div class="card" style="padding: 10px; display: flex; gap: 8px; align-items: center; background: #f1f5f9;">
            <i class="fas fa-search" style="color: var(--text-light); margin-left: 10px;"></i>
            <input type="text" id="searchInput" placeholder="Search notes..." style="margin-bottom: 0; border: none; background: transparent; padding: 8px;" onkeyup="renderTransactions()">
            <select id="filterType" onchange="renderTransactions()" style="margin-bottom: 0; width: 110px; padding: 5px;">
                <option value="all">All</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>
        
        <div id="transactionList"></div>
    </div>

    <div id="storesPage" class="page">
        <h1>Manage Stores</h1>
        <div class="card">
            <h3>Add New Store</h3><br>
            <input type="text" id="storeNameInput" placeholder="Store Name">
            <button class="btn primary-btn" onclick="addNewStore()">Create Store</button>
        </div>
        <div id="storeListContainer"></div>
    </div>

    <div id="settingsPage" class="page">
        <h1>Settings</h1>
        <div class="card" style="background: #f0fdf4; border: 1px solid #dcfce7;">
            <h3 style="color: #166534;"><i class="fas fa-file-excel"></i> Excel Backup</h3>
            <div style="margin-bottom: 10px;">
                <small>Select Store</small>
                <select id="backupStoreSelect"></select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <div><small>From</small><input type="date" id="backupFrom"></div>
                <div><small>To</small><input type="date" id="backupTo"></div>
            </div>
            <button class="btn" style="background: #166534; width:100%" onclick="downloadExcelBackup()">Download CSV</button>
        </div>

        <div class="card">
            <h3>Bulk Delete</h3>
            <select id="bulkStoreSelect"></select>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="deleteFrom">
                <input type="date" id="deleteTo">
            </div>
            <button class="btn expense-btn" style="width:100%" onclick="bulkDelete()">Delete Range</button>
        </div>
    </div>

    <div id="aboutPage" class="page">
        <div class="card" style="text-align: center; margin-top: 30px;">
            <h2>System Status</h2>
            <p>Professional Multi-Store Tracker</p>
            <p style="font-weight: bold; color: var(--primary);">Powered By EnMate</p>
        </div>
    </div>
</div>

<nav class="navbar">
    <button class="nav-item active" onclick="navigateTo('dashboardPage')"><i class="fas fa-chart-pie"></i>Dashboard</button>
    <button class="nav-item" onclick="navigateTo('storesPage')"><i class="fas fa-store"></i>Stores</button>
    <button class="nav-item" onclick="navigateTo('settingsPage')"><i class="fas fa-cog"></i>Settings</button>
    <button class="nav-item" onclick="navigateTo('aboutPage')"><i class="fas fa-info-circle"></i>About</button>
</nav>

<script src="config.js"></script>
<script>
    // --- APP STATE & PERSISTENCE ---
    let currentStoreId = localStorage.getItem('lastStoreId') || null;
    let selectedDate = new Date().toISOString().split('T')[0];
    let currentTransactions = JSON.parse(localStorage.getItem('cache_tx')) || [];
    let storesCache = JSON.parse(localStorage.getItem('cache_stores')) || [];

    // --- INITIALIZATION ---
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('datePicker').value = selectedDate;
        
        // Instant Hydration from LocalStorage
        if (storesCache.length > 0) {
            updateAllStoreDropdowns();
            renderTransactions();
        }
        
        // Background Sync
        fetchStores();
    });

    // --- NAVIGATION ---
    function navigateTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
        
        if (pageId === 'storesPage') renderStoresList();
    }

    // --- STORE LOGIC (SYNCED) ---
    async function fetchStores() {
        const { data } = await supabaseClient.from('stores').select('*').order('name');
        if (data) {
            storesCache = data;
            localStorage.setItem('cache_stores', JSON.stringify(data));
            updateAllStoreDropdowns();
            if (!currentStoreId && data.length > 0) {
                currentStoreId = data[0].id;
                localStorage.setItem('lastStoreId', currentStoreId);
            }
            refreshUI();
        }
    }

    function updateAllStoreDropdowns() {
        const targets = ['storeSelect', 'backupStoreSelect', 'bulkStoreSelect'];
        targets.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            let html = (id === 'backupStoreSelect') ? '<option value="all">All Stores</option>' : '';
            html += storesCache.map(s => `<option value="${s.id}" ${s.id == currentStoreId ? 'selected' : ''}>${s.name}</option>`).join('');
            el.innerHTML = html;
        });
    }

    async function addNewStore() {
        const input = document.getElementById('storeNameInput');
        if (!input.value.trim()) return;
        
        const { data, error } = await supabaseClient.from('stores').insert([{ name: input.value }]).select();
        if (!error) {
            storesCache.push(data[0]);
            localStorage.setItem('cache_stores', JSON.stringify(storesCache));
            input.value = '';
            renderStoresList();
            updateAllStoreDropdowns();
        }
    }

    async function editStore(id, oldName) {
        const newName = prompt("Edit Store Name:", oldName);
        if (!newName || newName === oldName) return;

        const { data, error } = await supabaseClient.from('stores').update({ name: newName }).eq('id', id).select();
        if (!error) {
            storesCache = storesCache.map(s => s.id === id ? data[0] : s);
            localStorage.setItem('cache_stores', JSON.stringify(storesCache));
            renderStoresList();
            updateAllStoreDropdowns();
        }
    }

    async function deleteStore(id) {
        if (!confirm("Delete store and its history?")) return;
        const { error } = await supabaseClient.from('stores').delete().eq('id', id);
        if (!error) {
            storesCache = storesCache.filter(s => s.id !== id);
            localStorage.setItem('cache_stores', JSON.stringify(storesCache));
            if (currentStoreId === id) currentStoreId = storesCache.length > 0 ? storesCache[0].id : null;
            renderStoresList();
            updateAllStoreDropdowns();
            refreshUI();
        }
    }

    function renderStoresList() {
        const container = document.getElementById('storeListContainer');
        container.innerHTML = storesCache.map(s => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px 15px;">
                <span><strong>${s.name}</strong></span>
                <div class="action-btns">
                    <button class="icon-btn" onclick="editStore('${s.id}', '${s.name}')"><i class="fas fa-edit"></i></button>
                    <button class="icon-btn" onclick="deleteStore('${s.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>`).join('');
    }

    // --- TRANSACTION LOGIC (OPTIMISTIC) ---
    document.getElementById('datePicker').onchange = (e) => { selectedDate = e.target.value; refreshUI(); };
    document.getElementById('storeSelect').onchange = (e) => { 
        currentStoreId = e.target.value; 
        localStorage.setItem('lastStoreId', currentStoreId);
        refreshUI(); 
    };

    async function refreshUI() {
        if (!currentStoreId) return;
        const dObj = new Date(selectedDate);
        const first = new Date(dObj.getFullYear(), dObj.getMonth(), 1).toISOString().split('T')[0];
        const last = new Date(dObj.getFullYear(), dObj.getMonth() + 1, 0).toISOString().split('T')[0];

        const { data } = await supabaseClient.from('transactions').select('*')
            .eq('store_id', currentStoreId).gte('date', first).lte('date', last).order('created_at', { ascending: false });

        if (data) {
            currentTransactions = data;
            localStorage.setItem('cache_tx', JSON.stringify(data));
            renderTransactions();
        }
    }

    function renderTransactions() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const typeFilter = document.getElementById('filterType').value;
        const container = document.getElementById('transactionList');
        let daily = 0, monthly = 0;
        
        container.innerHTML = '';
        currentTransactions.forEach(item => {
            const val = item.type === 'income' ? item.amount : -item.amount;
            monthly += val;

            if (item.date === selectedDate) {
                daily += val;
                if (item.description.toLowerCase().includes(search) && (typeFilter === 'all' || item.type === typeFilter)) {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.style.padding = '12px';
                    div.style.display = 'flex';
                    div.style.justifyContent = 'space-between';
                    if (item.isOptimistic) div.style.opacity = '0.5';
                    
                    div.innerHTML = `
                        <div><strong>${item.description}</strong><span class="meta-date">${formatTime12H(item.created_at)}</span></div>
                        <div style="color:${item.type==='income'?'var(--success)':'var(--danger)'};font-weight:700;">
                            ${item.type==='income'?'+':'-'}₹${item.amount.toFixed(2)}
                        </div>`;
                    container.appendChild(div);
                }
            }
        });
        document.getElementById('todayNet').textContent = `₹${daily.toFixed(2)}`;
        document.getElementById('monthNet').textContent = `₹${monthly.toFixed(2)}`;
    }

    async function addTransaction(type) {
        const amtEl = document.getElementById('amount');
        const descEl = document.getElementById('description');
        const amount = parseFloat(amtEl.value);
        const description = descEl.value || type;

        if (!currentStoreId || isNaN(amount)) return;

        // 1. Optimistic UI update
        const tempItem = {
            id: Date.now(),
            amount, type, description, 
            date: selectedDate, 
            created_at: new Date().toISOString(),
            isOptimistic: true
        };
        currentTransactions.unshift(tempItem);
        renderTransactions();
        amtEl.value = ''; descEl.value = '';

        // 2. Background Sync
        const { data, error } = await supabaseClient.from('transactions').insert([{
            store_id: currentStoreId, amount, type, description, date: selectedDate
        }]).select();

        if (!error) {
            currentTransactions = currentTransactions.map(t => t.id === tempItem.id ? data[0] : t);
            localStorage.setItem('cache_tx', JSON.stringify(currentTransactions));
            renderTransactions();
        }
    }

    // --- UTILS ---
    function formatTime12H(isoStr) {
        const d = new Date(isoStr);
        let hh = d.getHours();
        const mm = String(d.getMinutes()).padStart(2, '0');
        const ampm = hh >= 12 ? 'PM' : 'AM';
        hh = hh % 12 || 12;
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${hh}:${mm} ${ampm}`;
    }

    async function shareDailyReport() {
        if (!currentStoreId) return;
        const storeName = document.getElementById('storeSelect').options[document.getElementById('storeSelect').selectedIndex].text;
        let report = `*📊 Daily Report: ${storeName}*\n*Date:* ${selectedDate}\n--------------------------\n`;
        
        const items = currentTransactions.filter(i => i.date === selectedDate).reverse();
        items.forEach(item => {
            report += `${item.type === 'income' ? '➕' : '➖'} ₹${item.amount.toFixed(2)} - ${item.description}\n`;
        });
        report += `--------------------------\n*Total Net: ${document.getElementById('todayNet').textContent}*\n_via StoreCash Pro_`;

        if (navigator.share) {
            await navigator.share({ title: 'Daily Report', text: report });
        } else {
            navigator.clipboard.writeText(report);
            alert("Report copied to clipboard!");
        }
    }

    async function downloadExcelBackup() {
        const from = document.getElementById('backupFrom').value;
        const to = document.getElementById('backupTo').value;
        const storeId = document.getElementById('backupStoreSelect').value;

        let query = supabaseClient.from('transactions').select('*, stores(name)').order('date', { ascending: true });
        if (storeId !== 'all') query = query.eq('store_id', storeId);

        const { data } = await query;
        if (!data) return;

        let csv = "sep=\t\nDate\tTime\tStore\tNote\tType\tAmount\tBalance\n";
        let bal = 0;
        data.forEach(item => {
            if ((!from || item.date >= from) && (!to || item.date <= to)) {
                bal += (item.type === 'income' ? item.amount : -item.amount);
                csv += `${item.date}\t${formatTime12H(item.created_at)}\t${item.stores.name}\t${item.description}\t${item.type}\t${item.amount}\t${bal}\n`;
            }
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `StoreCash_Backup.csv`;
        a.click();
    }

    async function bulkDelete() {
        const sid = document.getElementById('bulkStoreSelect').value;
        const from = document.getElementById('deleteFrom').value;
        const to = document.getElementById('deleteTo').value;
        if (confirm("Permanently delete range?")) {
            await supabaseClient.from('transactions').delete().eq('store_id', sid).gte('date', from).lte('date', to);
            refreshUI();
        }
    }
</script>
</body>
</html>
